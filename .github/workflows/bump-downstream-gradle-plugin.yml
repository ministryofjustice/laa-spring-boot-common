name: Bump downstream Gradle plugin version

on:
  workflow_call:
    inputs:
      target_repository:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: 'main'
      new_version:
        required: false
        type: string
        default: '2.1.6'
    secrets:
      LAA_CCMS_CAAB_SERVICE_KEY:
        required: true

jobs:
  create-downstream-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_BRANCH: chore/bump-laa-spring-boot-gradle-plugin-${{ inputs.new_version }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
          private-key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}
          owner: ministryofjustice

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.base_branch }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Update plugin version in build.gradle or settings.gradle
        id: update
        shell: bash
        run: |
          set -euo pipefail

          pattern="id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin' version"
          files=(
            "target-repo/build.gradle"
            "target-repo/settings.gradle"
          )
          found_declaration=false
          changed_any=false

          for file in "${files[@]}"; do
            if [[ ! -f "$file" ]]; then
              continue
            fi

            if ! grep -qF "$pattern" "$file"; then
              continue
            fi

            found_declaration=true

            sed -E -i.bak \
              "s#(id 'uk\\.gov\\.laa\\.springboot\\.laa-spring-boot-gradle-plugin' version ')[^']+('.*)#\\1${{ inputs.new_version }}\\2#g" \
              "$file"
            rm -f "${file}.bak"

            if ! git -C target-repo diff --quiet -- "$file"; then
              changed_any=true
            fi
          done

          if [[ "$found_declaration" != "true" ]]; then
            echo "Expected plugin declaration not found in target-repo/build.gradle or target-repo/settings.gradle"
            exit 1
          fi

          if [[ "$changed_any" != "true" ]]; then
            echo "No changes detected (already on target version)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check for existing open pull request
        if: ${{ steps.update.outputs.changed == 'true' }}
        id: existing-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = '${{ inputs.target_repository }}'.split('/');
            const base = '${{ inputs.base_branch }}';
            const head = `${owner}:${process.env.PR_BRANCH}`;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head
            });

            if (pulls.length > 0) {
              core.info(`Open PR already exists: #${pulls[0].number} (${pulls[0].html_url})`);
              core.setOutput('exists', 'true');
              core.setOutput('number', String(pulls[0].number));
            } else {
              core.info('No open PR found for this branch/base.');
              core.setOutput('exists', 'false');
            }

      - name: Skip because PR already exists
        if: ${{ steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.exists == 'true' }}
        run: |
          echo "Skipping PR creation. Open PR #${{ steps.existing-pr.outputs.number }} already exists for branch $PR_BRANCH."

      - name: Create pull request
        if: ${{ steps.update.outputs.changed == 'true' && steps.existing-pr.outputs.exists != 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          branch: ${{ env.PR_BRANCH }}
          delete-branch: true
          commit-message: "chore: bump laa-spring-boot-gradle-plugin to ${{ inputs.new_version }}"
          title: "chore: bump laa-spring-boot-gradle-plugin to ${{ inputs.new_version }}"
          body: |
            This PR updates:

            `id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin' version '<current>'`

            to:

            `id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin' version '${{ inputs.new_version }}'`

            Generated by the `bump-downstream-gradle-plugin.yml` workflow in `laa-spring-boot-common`.
