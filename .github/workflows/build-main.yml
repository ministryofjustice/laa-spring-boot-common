name: Pipeline: main

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reltype:
        type: choice
        required: true
        default: "auto"
        description: "Release type"
        options: [ "auto", "none", "patch", "minor", "major" ]

jobs:
  release:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@chore/LJCP-27_release_plugin # TODO: pin to SHA on merge
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      java_version: '25'
      java_distribution: 'corretto'
      # 'auto' = empty string → shared workflow auto-detects from conventional commits
      reltype: ${{ inputs.reltype != 'auto' && inputs.reltype || '' }}
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      github_app_id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
      github_app_private_key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}
      github_app_organisation: ministryofjustice
