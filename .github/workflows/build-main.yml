name: Pipeline: main

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reltype:
        type: choice
        required: true
        default: "auto"
        description: "Release type"
        options: [ "auto", "none", "patch", "minor", "major" ]

jobs:
  plan:
    name: "Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      reltype: ${{ steps.compute.outputs.bump_type }}
      gtag:    ${{ steps.compute.outputs.next_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Determine dispatch reltype
        id: vars
        shell: bash
        run: |
          set -eu
          DISPATCH_RELTYPE=""
          if ${{ github.event_name == 'workflow_dispatch' && inputs.reltype != 'auto' }}; then
            DISPATCH_RELTYPE="${{ inputs.reltype }}"
          fi
          echo "dispatch_reltype=${DISPATCH_RELTYPE}" >> "$GITHUB_OUTPUT"

      - name: Compute version
        id: compute
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/compute-version@chore/LJCP-27_release_plugin # TODO: pin to SHA on merge
        with:
          bump: ${{ steps.vars.outputs.dispatch_reltype }}

  build:
    name: "Build"
    needs: [ plan ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Build
        run: ./gradlew build

  create-tag:
    name: "Create Git tag ${{ needs.plan.outputs.gtag }}"
    if: needs.plan.outputs.gtag != '' && needs.plan.outputs.reltype != 'none'
    needs: [ plan, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
          private-key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}
          owner: ministryofjustice
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Create Git tag
        env:
          GTAG: ${{ needs.plan.outputs.gtag }}
        run: |
          test -n "$GTAG"
          git config user.name  "laa-ccms-caab-service[bot]"
          git config user.email "laa-ccms-caab-service[bot]@users.noreply.github.com"
          if git ls-remote --tags origin | grep -q "refs/tags/${GTAG}$"; then
            echo "Tag ${GTAG} already exists on remote. Skipping."
            exit 0
          fi
          echo "Creating Git tag [${GTAG}]"
          git tag -a "$GTAG" -m "Release ${GTAG}"
          git push origin "$GTAG" || {
            EXIT=$?
            if git ls-remote --tags origin | grep -q "refs/tags/${GTAG}$"; then
              echo "Tag ${GTAG} was already pushed (race condition). Skipping."
            else
              echo "::error::Failed to push tag ${GTAG} (exit ${EXIT})" >&2
              exit $EXIT
            fi
          }

  publish:
    name: "Publish ${{ needs.plan.outputs.gtag }}"
    if: needs.plan.outputs.gtag != '' && needs.plan.outputs.reltype != 'none'
    needs: [ plan, create-tag ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Publish Maven artifact
        env:
          VERSION: ${{ needs.plan.outputs.gtag }}
        run: ./gradlew publish -Pversion="${VERSION#v}"

  create-release:
    name: "GitHub Release ${{ needs.plan.outputs.gtag }}"
    if: needs.plan.outputs.gtag != '' && needs.plan.outputs.reltype != 'none'
    needs: [ plan, publish ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GTAG: ${{ needs.plan.outputs.gtag }}
        run: |
          test -n "$GTAG"
          if gh release view "$GTAG" >/dev/null 2>&1; then
            echo "Release ${GTAG} already exists. Skipping."
            exit 0
          fi
          echo "Creating GitHub Release [${GTAG}]"
          gh release create "$GTAG" --verify-tag --title "$GTAG" --generate-notes

