name: Build main and spring3

on:
  pull_request:
    branches: [ main, spring3 ]
    types: [ closed ]

jobs:
  build-and-publish-release:
    if: ${{ github.event.pull_request.merged == true }}
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@9158d4d6670ea2f5e79b64702a32dca83df70cb3 # v1.0.17
    permissions:
      contents: write
      packages: write
    with:
      create_tag: 'true'
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
      github_bot_username: 'laa-ccms-caab-service'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      github_app_id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
      github_app_private_key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}
      github_app_organisation: 'ministryofjustice'
