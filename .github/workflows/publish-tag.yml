name: Publish tag

on:
  push:
    tags:
      - '*'

jobs:
  assemble-and-publish-tag:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@c60ec6d3ed19f9e998f50f0bf67bff4aa99052b8 # v1.0.14
    permissions:
      contents: write
      packages: write
    with:
      java_version: '25'
      java_distribution: 'corretto'
      build_command: 'assemble'
      publish_package: 'true'
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
