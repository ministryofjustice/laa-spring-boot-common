name: Publish tag

on:
  push:
    tags:
      - '*'

jobs:
  assemble-and-publish-tag:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@b2350e05704b799a08a9a22c4ee16992adaa6e38 # v1.0.18
    permissions:
      contents: write
      packages: write
    with:
      java_version: '25'
      java_distribution: 'corretto'
      build_command: 'assemble'
      publish_package: 'true'
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
