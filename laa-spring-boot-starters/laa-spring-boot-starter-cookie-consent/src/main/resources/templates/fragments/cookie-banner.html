
<div aria-label="Cookies on this service"
     class="govuk-cookie-banner"
     data-nosnippet
     role="region"
     th:fragment="cookieBanner">

    <!-- Initial cookie banner -->
    <div class="govuk-cookie-banner__message govuk-width-container"
         th:if="${true}">
        <div class="govuk-grid-row">
            <div class="govuk-grid-column-two-thirds">
                <h2 class="govuk-cookie-banner__heading govuk-heading-m">
                    Cookies on this service
                </h2>
                <div class="govuk-cookie-banner__content">
                    <p class="govuk-body">
                        We use some essential cookies to make this service work.
                    </p>
                    <p class="govuk-body">
                        We’d like to set additional cookies so we can remember your settings, understand how people use
                        the service and make improvements.
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>
