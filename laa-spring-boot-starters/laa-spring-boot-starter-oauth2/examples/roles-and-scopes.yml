laa.springboot.starter.oauth2:
  resourceserver:
    jwt:
      tenants:
        - issuer-uri: https://login.microsoftonline.com/<external_tenant_id>/v2.0
          audiences:
            - <entra_app_reg_client_id>
  authorized-roles: '[
    {
      "name": "library-catalogue-service",
      "uris": [
        {"method":["GET","POST","PATCH"],"uri":"/api/v*/books/**"},
        {"method":["GET","POST"],"uri":"/api/v*/authors/**"},
        {"method":["GET"],"uri":"/api/v*/libraries/**"}
      ]
    }
  ]'
  authorized-scopes: '[
    {
      "name": "books.read",
      "uris": [
        {"method":["GET"],"uri":"/api/v*/books"},
        {"method":["GET"],"uri":"/api/v*/books/**"},
        {"method":["GET"],"uri":"/api/v*/authors/**"}
      ]
    },
    {
      "name": "libraries.manage",
      "uris": [
        {"method":["GET","POST","PATCH"],"uri":"/api/v*/libraries/**"},
        {"method":["GET","POST"],"uri":"/api/v*/libraries/*/books/**"}
      ]
    }
  ]'
  unprotected-uris: [ "/actuator/**", "/swagger-ui.html",
                      "/swagger-ui/**", "/v3/api-docs/**", "/favicon.ico",
                      "/open-api-specification.yml" ]
